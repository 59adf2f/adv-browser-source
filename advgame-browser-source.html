<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADV Game Browser Source</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: transparent;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Inter', 'Segoe UI', sans-serif;
  }
 
  .overlay-anchor {
    position: fixed;
    bottom: 30px;
    right: -420px;
    width: 380px;
    transition: right 0.7s cubic-bezier(0.22, 0.68, 0.31, 1.12);
    z-index: 9999;
    filter: drop-shadow(0 4px 30px rgba(0,0,0,0.6)) drop-shadow(0 0 40px rgba(255, 110, 199, 0.25));
  }
 
  .overlay-anchor.visible {
    right: 24px;
  }
 
  .card {
    background: linear-gradient(150deg, rgba(26, 16, 40, 0.96), rgba(10, 10, 18, 0.98));
    border: 2px solid rgba(255, 224, 102, 0.3);
    border-radius: 18px;
    padding: 22px 24px 18px 24px;
    position: relative;
    overflow: hidden;
  }
 
  /* Animated rainbow border glow */
  .card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ff6ec7, #ffe066, #66ffcc, #6e8eff, #ff6ec7);
    background-size: 300% 300%;
    animation: borderGlow 4s ease-in-out infinite;
    z-index: -1;
    opacity: 0.5;
  }
 
  @keyframes borderGlow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
 
  /* Shimmer sweep */
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 224, 102, 0.05), transparent);
    animation: shimmer 5s ease-in-out infinite;
    pointer-events: none;
  }
 
  @keyframes shimmer {
    0%, 100% { left: -100%; }
    50% { left: 150%; }
  }
 
  /* Logo */
  .logo-wrap {
    text-align: center;
    margin-bottom: 14px;
  }
 
  .logo-wrap img {
    height: 36px;
    display: block;
    margin: 0 auto;
  }
 
  /* Game title */
  .game-title {
    text-align: center;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #ff6ec7, #ffe066, #66ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    animation: titleShimmer 3s ease-in-out infinite;
    background-size: 200% 200%;
  }
 
  @keyframes titleShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
 
  /* Tagline */
  .tagline {
    text-align: center;
    color: rgba(255, 255, 255, 0.7);
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 16px;
    line-height: 1.4;
  }
 
  .tagline span {
    color: #ffe066;
  }
 
  /* Prize range strip */
  .prize-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 12px;
    background: rgba(255, 224, 102, 0.08);
    border: 1px solid rgba(255, 224, 102, 0.2);
    margin-bottom: 16px;
  }
 
  .prize-strip .range {
    font-size: 14px;
    font-weight: 900;
    color: #ffe066;
    text-shadow: 0 0 10px rgba(255, 224, 102, 0.4);
  }
 
  .prize-strip .divider {
    color: rgba(255, 255, 255, 0.25);
    font-size: 16px;
  }
 
  .prize-strip .top {
    font-size: 13px;
    font-weight: 900;
    color: #66ffcc;
    text-shadow: 0 0 10px rgba(102, 255, 204, 0.4);
  }
 
  /* CTA */
  .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
 
  .cta .label {
    color: rgba(255, 255, 255, 0.4);
    font-size: 13px;
    font-weight: 700;
  }
 
  .cta .cmd {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    background: linear-gradient(135deg, rgba(255, 110, 199, 0.2), rgba(110, 142, 255, 0.2));
    border: 1px solid rgba(255, 110, 199, 0.35);
    padding: 5px 14px;
    border-radius: 8px;
    text-shadow: 0 0 10px rgba(255, 110, 199, 0.5);
    animation: cmdPulse 2.5s ease-in-out infinite;
  }
 
  @keyframes cmdPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255, 110, 199, 0.2); }
    50% { box-shadow: 0 0 20px rgba(255, 110, 199, 0.4), 0 0 30px rgba(255, 224, 102, 0.15); }
  }
</style>
</head>
<body>
 
<div class="overlay-anchor" id="overlay">
  <div class="card">
 
    <div class="logo-wrap">
      <img src="https://cdn.shopify.com/s/files/1/0459/6036/4189/files/ADV-Logo-Horizontal_3_2.png?v=1773413277" alt="Advanced" onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block';">
      <div id="logo-fallback" style="display:none;text-align:center;font-family:'Inter',sans-serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:3px;">ADVANCED®</div>
    </div>
 
    <div class="game-title">SOUR RAINBOW CANDY RUSH</div>
 
    <div class="tagline">Play our 3D game &amp; win <span>real prizes</span></div>
 
    <div class="prize-strip">
      <span class="range">20% Off</span>
      <span class="divider">→</span>
      <span class="top">🏆 Up to 40% Off!</span>
    </div>
 
    <div class="cta">
      <span class="label">Type</span>
      <span class="cmd">!advgame</span>
      <span class="label">in chat</span>
    </div>
 
  </div>
</div>
 
<script>
  var SHOW_DURATION = 15000;   // 15 seconds visible
  var HIDE_DURATION = 120000;  // 2 minutes hidden
  var overlay = document.getElementById('overlay');
 
  function slideIn() {
    overlay.classList.add('visible');
    setTimeout(slideOut, SHOW_DURATION);
  }
 
  function slideOut() {
    overlay.classList.remove('visible');
    setTimeout(slideIn, HIDE_DURATION);
  }
 
  setTimeout(slideIn, 3000);
</script>
 
</body>
</html>
